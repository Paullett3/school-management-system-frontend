<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Management System</title>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <!-- ================================================================= -->
    <!-- 🟢 ROOT DOM NODE: React will inject the entire app tree here      -->
    <!-- ================================================================= -->
    <div id="root"></div>

    <!-- ================================================================= -->
    <!-- ⚡ VITE MODULE ENTRY POINT                                       -->
    <!-- CRITICAL: Must use type="module" and leading slash "/src/main.jsx"-->
    <!-- Vite intercepts this request and compiles JSX -> JS on the fly    -->
    <!-- ================================================================= -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
